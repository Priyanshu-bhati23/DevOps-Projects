name: CI/CD Pipeline

# ── Triggers ──────────────────────────────────────────────────────────────────
on:
  push:
    branches: [main]          # run on every push to main
  pull_request:
    branches: [main]          # run on PRs targeting main (but don't deploy)

# ── Environment variables ─────────────────────────────────────────────────────
env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/devops-project1

# ── Jobs ──────────────────────────────────────────────────────────────────────
jobs:

  # ── Job 1: Lint + Test ───────────────────────────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    services:
      # Spin up a real Redis for integration tests
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip                          # cache pip downloads between runs

      - name: Install dependencies
        run: pip install -r app/requirements.txt pytest pytest-cov flake8

      - name: Lint with flake8
        run: |
          # fail on syntax errors or undefined names
          flake8 app/ --count --select=E9,F63,F7,F82 --show-source --statistics
          # warn on style issues (max line length 120)
          flake8 app/ --count --max-line-length=120 --statistics

      - name: Run tests
        env:
          REDIS_HOST: localhost
          REDIS_PORT: 6379
        run: pytest tests/ -v --cov=app --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  # ── Job 2: Build & Push Docker image ─────────────────────────────────────────
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: test                              # only runs if 'test' job passes
    if: github.ref == 'refs/heads/main'      # only on main branch, not PRs

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3  # enables BuildKit — faster, better caching

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}  # use Access Token, not password

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-           # tag with git SHA: sha-abc1234
            type=raw,value=latest          # also tag as 'latest'

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          dockerfile: Dockerfile
          target: runtime
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha             # GitHub Actions cache for Docker layers
          cache-to: type=gha,mode=max

      - name: Image summary
        run: |
          echo "### Docker Image Published" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** ${{ env.IMAGE_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "**SHA tag:** sha-${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
